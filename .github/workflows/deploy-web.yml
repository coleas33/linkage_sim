name: Deploy Web to Vercel

on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            linkage-sim-rs/target/
          key: wasm-cargo-${{ hashFiles('linkage-sim-rs/Cargo.lock') }}
          restore-keys: wasm-cargo-

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli@0.2.114

      - name: Build WASM
        working-directory: linkage-sim-rs
        run: |
          cargo build --release \
            --target wasm32-unknown-unknown \
            --bin linkage-web \
            --no-default-features
          wasm-bindgen \
            target/wasm32-unknown-unknown/release/linkage-web.wasm \
            --out-dir web \
            --target web \
            --no-typescript

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        working-directory: linkage-sim-rs/web
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Vercel output
        working-directory: linkage-sim-rs/web
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        working-directory: linkage-sim-rs/web
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
